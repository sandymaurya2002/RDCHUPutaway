name: 🏗️ Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: ☕ Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Android platform tools
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null | grep -E "done|Installed" || true

      - name: 📦 npm install
        run: |
          npm install --legacy-peer-deps
          echo "=== Verify gradle plugin exists ==="
          ls node_modules/@react-native/gradle-plugin/
          echo "node_modules location: $(pwd)/node_modules"

      - name: ⬇️ Download gradle-wrapper.jar
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/gradle/gradle/v8.6.0/gradle/wrapper/gradle-wrapper.jar" \
            -o android/gradle/wrapper/gradle-wrapper.jar
          ls -lh android/gradle/wrapper/gradle-wrapper.jar

      - name: 🔧 Fix gradlew + settings.gradle
        run: |
          chmod +x android/gradlew

          # CRITICAL: settings.gradle uses ../node_modules relative to android/
          # Verify the path resolves correctly
          echo "=== Path check ==="
          ls android/../node_modules/@react-native/gradle-plugin/ | head -5

          # Rewrite settings.gradle with absolute path to be 100% safe
          ROOT=$(pwd)
          cat > android/settings.gradle << EOF
          pluginManagement { includeBuild("$ROOT/node_modules/@react-native/gradle-plugin") }
          plugins { id("com.facebook.react.settings") }
          extensions.configure(com.facebook.react.ReactSettingsExtension){ ex -> ex.autolinkLibrariesFromCommand() }
          rootProject.name = 'RDCHUPutaway'
          include ':app'
          includeBuild("$ROOT/node_modules/@react-native/gradle-plugin")
          EOF

          echo "=== settings.gradle ==="
          cat android/settings.gradle

      - name: 💾 Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: gradle-${{ runner.os }}-8-6-v6

      - name: 🏗️ Build APK
        run: |
          cd android
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4096m"
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: 🔍 Find APK
        run: find . -name "*.apk" 2>/dev/null

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RDCHUPutaway-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
