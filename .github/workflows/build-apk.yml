name: 🏗️ Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 90
    container:
      image: reactnativecommunity/react-native-android:latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Use Node 18
        run: |
          node --version
          npm --version
          java -version

      - name: 🏗️ Scaffold React Native project
        run: |
          cd /tmp
          npx react-native@0.73.6 init RDCScaffold \
            --version 0.73.6 \
            --skip-install \
            --npm
          echo "✅ Scaffold done"

      - name: 🔀 Overlay source files
        run: |
          S=/tmp/RDCScaffold
          W=$GITHUB_WORKSPACE
          cp -rf $W/src $S/
          cp -f $W/App.js $W/index.js $W/app.json $W/babel.config.js $W/metro.config.js $W/package.json $S/
          cp -f $W/android/build.gradle $S/android/build.gradle
          cp -f $W/android/settings.gradle $S/android/settings.gradle
          cp -f $W/android/gradle.properties $S/android/gradle.properties
          cp -f $W/android/app/build.gradle $S/android/app/build.gradle
          cp -f $W/android/app/proguard-rules.pro $S/android/app/proguard-rules.pro
          cp -f $W/android/app/src/main/AndroidManifest.xml $S/android/app/src/main/AndroidManifest.xml
          cp -f $W/android/app/src/main/res/values/strings.xml $S/android/app/src/main/res/values/strings.xml
          cp -f $W/android/app/src/main/res/values/styles.xml $S/android/app/src/main/res/values/styles.xml
          mkdir -p $S/android/app/src/main/java/com/rdchuputaway
          cp -f $W/android/app/src/main/java/com/rdchuputaway/*.kt $S/android/app/src/main/java/com/rdchuputaway/
          echo "✅ Overlay done"

      - name: 📦 Install dependencies
        run: |
          cd /tmp/RDCScaffold
          npm install --legacy-peer-deps

      - name: 💾 Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: gradle-v1-${{ hashFiles('/tmp/RDCScaffold/android/gradle/wrapper/gradle-wrapper.properties') }}

      - name: 🏗️ Build APK
        run: |
          cd /tmp/RDCScaffold/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx4g"

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RDCHUPutaway-debug-apk
          path: /tmp/RDCScaffold/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
