name: 🏗️ Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: ☕ Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Android platform tools
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null | grep -E "done|Installed" || true

      - name: 🏗️ react-native init with full npm install
        env:
          CI: ""
        run: |
          npx --yes react-native@0.73.6 init RDCBuild \
            --version 0.73.6 \
            --directory /tmp/RDCBuild \
            --npm
          echo "✅ Init done"
          echo "node_modules: $(ls /tmp/RDCBuild/node_modules | wc -l) packages"

      - name: 📦 Add our extra dependencies
        run: |
          cd /tmp/RDCBuild
          npm install --legacy-peer-deps \
            axios@^1.6.8 \
            @react-navigation/native@^6.1.17 \
            @react-navigation/native-stack@^6.9.26 \
            react-native-screens@^3.30.1 \
            react-native-safe-area-context@^4.9.0 \
            react-native-vision-camera@^4.3.2 \
            @react-native-async-storage/async-storage@^1.23.1
          echo "✅ Extra deps installed"

      - name: 🔀 Overlay our files
        run: |
          S=/tmp/RDCBuild
          W=$GITHUB_WORKSPACE

          # JS source
          rm -rf $S/src
          cp -rf $W/src $S/src
          cp -f $W/App.js $W/index.js $W/app.json $W/babel.config.js $W/metro.config.js $S/

          # Android resources only (NO gradle files)
          cp -f $W/android/app/src/main/AndroidManifest.xml \
                $S/android/app/src/main/AndroidManifest.xml
          cp -f $W/android/app/src/main/res/values/strings.xml \
                $S/android/app/src/main/res/values/strings.xml
          cp -f $W/android/app/src/main/res/values/styles.xml \
                $S/android/app/src/main/res/values/styles.xml

          # Kotlin - detect scaffold package
          KT_DIR=$(find $S/android -name "MainActivity.kt" | head -1 | xargs dirname)
          PKG=$(echo $KT_DIR | sed 's|.*/java/||' | tr '/' '.')
          echo "Scaffold package: $PKG"

          sed "s/^package .*/package $PKG/" \
            $W/android/app/src/main/java/com/rdchuputaway/MainActivity.kt > $KT_DIR/MainActivity.kt
          sed "s/^package .*/package $PKG/" \
            $W/android/app/src/main/java/com/rdchuputaway/MainApplication.kt > $KT_DIR/MainApplication.kt

          # Generate debug keystore if missing
          if [ ! -f "$S/android/app/debug.keystore" ]; then
            keytool -genkeypair -v \
              -keystore $S/android/app/debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -storepass android \
              -keypass android \
              -dname "CN=Android Debug,O=Android,C=US" 2>/dev/null
            echo "✅ debug.keystore generated"
          fi

          echo "✅ Overlay complete"
          echo "=== Kotlin files ==="
          find $S/android/app/src/main/java -name "*.kt"

      - name: ⬇️ Download gradle-wrapper.jar
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/gradle/gradle/v8.6.0/gradle/wrapper/gradle-wrapper.jar" \
            -o /tmp/RDCBuild/android/gradle/wrapper/gradle-wrapper.jar
          ls -lh /tmp/RDCBuild/android/gradle/wrapper/gradle-wrapper.jar

      - name: 💾 Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: gradle-${{ runner.os }}-rn073-final-v2

      - name: 🔧 chmod gradlew
        run: chmod +x /tmp/RDCBuild/android/gradlew

      - name: 🏗️ Build APK
        run: |
          cd /tmp/RDCBuild/android
          echo "=== gradle-wrapper ==="
          cat gradle/wrapper/gradle-wrapper.properties
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4096m"
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: 🔍 Find APK
        run: find /tmp/RDCBuild -name "*.apk" 2>/dev/null

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RDCHUPutaway-debug-apk
          path: /tmp/RDCBuild/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
