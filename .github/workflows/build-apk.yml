name: 🏗️ Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: ☕ Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Android platform tools
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null | grep -E "done|Installed" || true

      - name: 📦 npm install
        run: |
          npm install --legacy-peer-deps
          echo "✅ $(ls node_modules | wc -l) packages"

      - name: 🔍 Inspect gradle-plugin (critical debug)
        run: |
          PLUGIN=node_modules/@react-native/gradle-plugin
          echo "=== ALL files in gradle-plugin ==="
          find $PLUGIN -maxdepth 3 -type f | sort
          echo ""
          echo "=== settings file? ==="
          cat $PLUGIN/settings.gradle 2>/dev/null || cat $PLUGIN/settings.gradle.kts 2>/dev/null || echo "NO settings file found"
          echo ""
          echo "=== Plugin descriptors ==="
          find $PLUGIN -name "*.properties" | xargs grep -l "implementation-class" 2>/dev/null | head -5
          find $PLUGIN -name "*.properties" | xargs grep -l "implementation-class" 2>/dev/null | while read f; do echo "--- $f ---"; cat "$f"; done

      - name: 🔧 Add settings.gradle to gradle-plugin if missing
        run: |
          PLUGIN=node_modules/@react-native/gradle-plugin
          if [ ! -f "$PLUGIN/settings.gradle" ] && [ ! -f "$PLUGIN/settings.gradle.kts" ]; then
            echo "rootProject.name = 'gradle-plugin'" > $PLUGIN/settings.gradle
            echo "✅ Created settings.gradle in gradle-plugin"
          else
            echo "ℹ️  settings file already exists"
          fi
          cat $PLUGIN/settings.gradle 2>/dev/null || cat $PLUGIN/settings.gradle.kts 2>/dev/null

      - name: ⬇️ Download gradle-wrapper.jar
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/gradle/gradle/v8.6.0/gradle/wrapper/gradle-wrapper.jar" \
            -o android/gradle/wrapper/gradle-wrapper.jar
          ls -lh android/gradle/wrapper/gradle-wrapper.jar

      - name: 🔧 Setup
        run: chmod +x android/gradlew

      - name: 💾 Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: gradle-${{ runner.os }}-rn073-v10

      - name: 🏗️ Build APK
        run: |
          cd android
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4096m"
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: 🔍 Find APK
        run: find . -name "*.apk" 2>/dev/null

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RDCHUPutaway-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
