name: 🏗️ Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: ☕ Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Android SDK platforms
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" 2>/dev/null | tail -3 || true

      - name: 🏗️ Scaffold React Native project
        env:
          CI: ""
        run: |
          npx --yes react-native@0.73.6 init RDCBuild \
            --version 0.73.6 \
            --directory /tmp/RDCBuild \
            --npm
          echo "✅ Scaffold + npm install done"
          echo "Packages: $(ls /tmp/RDCBuild/node_modules | wc -l)"

      - name: 📦 Install our app dependencies
        run: |
          cd /tmp/RDCBuild
          npm install --legacy-peer-deps \
            axios@^1.6.8 \
            "@react-navigation/native@^6.1.17" \
            "@react-navigation/native-stack@^6.9.26" \
            react-native-screens@^3.30.1 \
            react-native-safe-area-context@^4.9.0 \
            react-native-vision-camera@^4.3.2 \
            "@react-native-async-storage/async-storage@^1.23.1"
          echo "✅ App deps installed: $(ls node_modules | wc -l) total packages"

      - name: 🔀 Overlay source files
        run: |
          S=/tmp/RDCBuild
          W=$GITHUB_WORKSPACE

          # JS
          rm -rf $S/src
          cp -rf $W/src $S/src
          cp -f $W/App.js $W/index.js $W/app.json $W/babel.config.js $W/metro.config.js $S/

          # Detect scaffold's package name
          KT_DIR=$(find $S/android -name "MainActivity.kt" | head -1 | xargs dirname)
          PKG=$(echo $KT_DIR | sed 's|.*/java/||' | tr '/' '.')
          echo "Scaffold package: $PKG"

          # Kotlin files with correct package
          sed "s/^package .*/package $PKG/" \
            $W/android/app/src/main/java/com/rdchuputaway/MainActivity.kt > $KT_DIR/MainActivity.kt
          sed "s/^package .*/package $PKG/" \
            $W/android/app/src/main/java/com/rdchuputaway/MainApplication.kt > $KT_DIR/MainApplication.kt

          # Android resources
          cp -f $W/android/app/src/main/AndroidManifest.xml \
                $S/android/app/src/main/AndroidManifest.xml
          cp -f $W/android/app/src/main/res/values/strings.xml \
                $S/android/app/src/main/res/values/strings.xml
          cp -f $W/android/app/src/main/res/values/styles.xml \
                $S/android/app/src/main/res/values/styles.xml

          # Generate debug keystore
          keytool -genkeypair -v \
            -keystore $S/android/app/debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 \
            -validity 10000 -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" 2>/dev/null && echo "✅ Keystore generated"

          # Show what we have
          echo "=== Kotlin files ==="
          find $S/android/app/src/main/java -name "*.kt"
          echo "=== Gradle files ==="
          cat $S/android/settings.gradle
          echo "--- app/build.gradle ---"
          cat $S/android/app/build.gradle

      - name: ⬇️ Download gradle-wrapper.jar
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/gradle/gradle/v8.6.0/gradle/wrapper/gradle-wrapper.jar" \
            -o /tmp/RDCBuild/android/gradle/wrapper/gradle-wrapper.jar
          ls -lh /tmp/RDCBuild/android/gradle/wrapper/gradle-wrapper.jar

      - name: 💾 Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: gradle-${{ runner.os }}-rn073-v3

      - name: 🔧 Permissions
        run: chmod +x /tmp/RDCBuild/android/gradlew

      - name: 🏗️ Build APK (attempt 1)
        id: build1
        continue-on-error: true
        run: |
          cd /tmp/RDCBuild/android
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx4096m" 2>&1 | tee /tmp/build1.log
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: 🔍 Diagnose & fix build errors
        if: steps.build1.outcome == 'failure'
        run: |
          S=/tmp/RDCBuild
          LOG=/tmp/build1.log

          echo "=== BUILD FAILED - Diagnosing... ==="
          grep -E "error:|Error:|FAILED|Exception" $LOG | head -30

          # Fix 1: Unresolved reference in Kotlin - use simpler Kotlin files
          if grep -q "Unresolved reference\|error: unresolved" $LOG; then
            echo "🔧 Fix: Kotlin unresolved reference - simplifying Kotlin files"
            KT_DIR=$(find $S/android -name "MainActivity.kt" | head -1 | xargs dirname)
            PKG=$(echo $KT_DIR | sed 's|.*/java/||' | tr '/' '.')

            cat > $KT_DIR/MainActivity.kt << EOF
          package $PKG
          import com.facebook.react.ReactActivity
          import com.facebook.react.ReactActivityDelegate
          import com.facebook.react.defaults.DefaultNewArchitectureEntryPoint.fabricEnabled
          import com.facebook.react.defaults.DefaultReactActivityDelegate
          class MainActivity : ReactActivity() {
            override fun getMainComponentName(): String = "RDCHUPutaway"
            override fun createReactActivityDelegate(): ReactActivityDelegate =
              DefaultReactActivityDelegate(this, mainComponentName, fabricEnabled)
          }
          EOF

            cat > $KT_DIR/MainApplication.kt << EOF
          package $PKG
          import android.app.Application
          import com.facebook.react.PackageList
          import com.facebook.react.ReactApplication
          import com.facebook.react.ReactHost
          import com.facebook.react.ReactNativeHost
          import com.facebook.react.ReactPackage
          import com.facebook.react.defaults.DefaultNewArchitectureEntryPoint.load
          import com.facebook.react.defaults.DefaultReactHost.getDefaultReactHost
          import com.facebook.react.defaults.DefaultReactNativeHost
          import com.facebook.soloader.SoLoader
          class MainApplication : Application(), ReactApplication {
            override val reactNativeHost: ReactNativeHost = object : DefaultReactNativeHost(this) {
              override fun getPackages(): List<ReactPackage> = PackageList(this).packages
              override fun getJSMainModuleName(): String = "index"
              override fun getUseDeveloperSupport(): Boolean = BuildConfig.DEBUG
              override val isNewArchEnabled: Boolean = BuildConfig.IS_NEW_ARCHITECTURE_ENABLED
              override val isHermesEnabled: Boolean = BuildConfig.IS_HERMES_ENABLED
            }
            override val reactHost: ReactHost get() = getDefaultReactHost(applicationContext, reactNativeHost)
            override fun onCreate() {
              super.onCreate()
              SoLoader.init(this, false)
              if (BuildConfig.IS_NEW_ARCHITECTURE_ENABLED) { load() }
            }
          }
          EOF
            echo "✅ Kotlin files simplified"
          fi

          # Fix 2: Manifest merge conflict
          if grep -q "Manifest merger\|AndroidManifest" $LOG; then
            echo "🔧 Fix: Manifest merge conflict - using scaffold's manifest"
            git -C $S show HEAD:android/app/src/main/AndroidManifest.xml > \
              $S/android/app/src/main/AndroidManifest.xml 2>/dev/null || true
          fi

          # Fix 3: Resource not found
          if grep -q "resource.*not found\|No resource" $LOG; then
            echo "🔧 Fix: Resource issue - restoring scaffold resources"
            cp -rf /tmp/RDCBuild_backup/android/app/src/main/res \
                   $S/android/app/src/main/res 2>/dev/null || true
          fi

          # Fix 4: Vision camera issues
          if grep -q "vision.camera\|VisionCamera\|mrousavy" $LOG; then
            echo "🔧 Fix: Vision camera issue - removing from deps"
            cd $S && npm uninstall react-native-vision-camera 2>/dev/null || true
          fi

          echo "=== Fixes applied, ready for retry ==="

      - name: 🏗️ Build APK (attempt 2 - after fixes)
        if: steps.build1.outcome == 'failure'
        id: build2
        continue-on-error: true
        run: |
          cd /tmp/RDCBuild/android
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx4096m" 2>&1 | tee /tmp/build2.log
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: 🔍 Diagnose attempt 2 errors
        if: steps.build2.outcome == 'failure'
        run: |
          echo "=== ATTEMPT 2 FAILED - Full error log ==="
          grep -E "error:|Error:|FAILED|Exception|What went wrong" /tmp/build2.log | head -50
          echo ""
          echo "=== Last 100 lines ==="
          tail -100 /tmp/build2.log

      - name: 🏗️ Build APK (attempt 3 - clean build)
        if: steps.build2.outcome == 'failure'
        run: |
          cd /tmp/RDCBuild/android
          ./gradlew clean assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx4096m" --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: 🔍 Find APK
        run: |
          echo "=== Searching for APK ==="
          find /tmp/RDCBuild -name "*.apk" 2>/dev/null
          APK=$(find /tmp/RDCBuild -name "*.apk" 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            echo "✅ APK found: $APK"
            echo "Size: $(du -sh $APK | cut -f1)"
          else
            echo "❌ No APK found"
            exit 1
          fi

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RDCHUPutaway-debug-apk
          path: /tmp/RDCBuild/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: ✅ Success
        run: |
          echo "## ✅ APK Built Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "**App:** RDC HU Putaway" >> $GITHUB_STEP_SUMMARY
          echo "**SAP Server:** https://sap-api.v2retail.net" >> $GITHUB_STEP_SUMMARY
          echo "**User:** 901 | **Plant:** DW01" >> $GITHUB_STEP_SUMMARY
