name: 🏗️ Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: ☕ Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Android platform
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null | grep -E "done|Installed" || true

      - name: 🏗️ Use react-native init (proper scaffold)
        run: |
          npm install -g react-native-cli 2>/dev/null || true
          npx react-native@0.73.6 init RDCScaffold \
            --version 0.73.6 \
            --directory /tmp/RDCScaffold \
            --skip-install \
            --npm \
            --title "RDC HU Putaway" \
            2>&1
          echo "=== Scaffold android structure ==="
          find /tmp/RDCScaffold/android -maxdepth 4 -type f -name "*.kt" -o -name "*.gradle" -o -name "*.kts" | sort

      - name: 🔀 Overlay JS source
        run: |
          S=/tmp/RDCScaffold
          W=$GITHUB_WORKSPACE
          rm -rf $S/src 2>/dev/null
          cp -rf $W/src             $S/src
          cp -f  $W/App.js          $S/App.js
          cp -f  $W/index.js        $S/index.js
          cp -f  $W/app.json        $S/app.json
          cp -f  $W/babel.config.js $S/babel.config.js
          cp -f  $W/metro.config.js $S/metro.config.js
          cp -f  $W/package.json    $S/package.json
          echo "✅ JS overlay done"

      - name: 📦 npm install
        run: |
          cd /tmp/RDCScaffold
          npm install --legacy-peer-deps
          echo "✅ $(ls node_modules | wc -l) packages"

      - name: 🔀 Overlay Android files
        run: |
          S=/tmp/RDCScaffold
          W=$GITHUB_WORKSPACE

          # Show what the scaffold generated
          echo "=== Scaffold android java structure ==="
          find $S/android/app/src/main/java -type f | sort

          # Copy our android config
          cp -f $W/android/build.gradle             $S/android/build.gradle
          cp -f $W/android/gradle.properties        $S/android/gradle.properties
          cp -f $W/android/app/build.gradle         $S/android/app/build.gradle
          cp -f $W/android/app/proguard-rules.pro   $S/android/app/proguard-rules.pro
          cp -f $W/android/gradle/wrapper/gradle-wrapper.properties \
                $S/android/gradle/wrapper/gradle-wrapper.properties
          cp -f $W/android/app/src/main/AndroidManifest.xml \
                $S/android/app/src/main/AndroidManifest.xml
          cp -f $W/android/app/src/main/res/values/strings.xml \
                $S/android/app/src/main/res/values/strings.xml
          cp -f $W/android/app/src/main/res/values/styles.xml \
                $S/android/app/src/main/res/values/styles.xml

          # Find where scaffold put its kotlin files and replace them
          SCAFFOLD_KT_DIR=$(find $S/android/app/src/main/java -type f -name "MainActivity.kt" | head -1 | xargs dirname)
          echo "Scaffold Kotlin dir: $SCAFFOLD_KT_DIR"
          cp -f $W/android/app/src/main/java/com/rdchuputaway/MainActivity.kt    $SCAFFOLD_KT_DIR/
          cp -f $W/android/app/src/main/java/com/rdchuputaway/MainApplication.kt $SCAFFOLD_KT_DIR/

          # Fix package name in Kotlin files to match scaffold's package
          SCAFFOLD_PKG=$(echo $SCAFFOLD_KT_DIR | sed 's|.*/java/||' | tr '/' '.')
          echo "Scaffold package: $SCAFFOLD_PKG"
          sed -i "s/package com\.rdchuputaway/package $SCAFFOLD_PKG/" $SCAFFOLD_KT_DIR/MainActivity.kt
          sed -i "s/package com\.rdchuputaway/package $SCAFFOLD_PKG/" $SCAFFOLD_KT_DIR/MainApplication.kt

          # Fix app/build.gradle namespace to match scaffold package
          sed -i "s/namespace \"com\.rdchuputaway\"/namespace \"$SCAFFOLD_PKG\"/" $S/android/app/build.gradle
          sed -i "s/applicationId \"com\.rdchuputaway\"/applicationId \"$SCAFFOLD_PKG\"/" $S/android/app/build.gradle

          echo "=== Final Kotlin files ==="
          find $S/android/app/src/main/java -name "*.kt"
          echo "=== app/build.gradle namespace ==="
          grep -E "namespace|applicationId" $S/android/app/build.gradle

      - name: 💾 Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: gradle-${{ runner.os }}-8-6-v4

      - name: 🔧 chmod gradlew
        run: chmod +x /tmp/RDCScaffold/android/gradlew

      - name: 🏗️ Build APK
        run: |
          cd /tmp/RDCScaffold/android
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4096m"
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: 🔍 Find APK
        run: find /tmp/RDCScaffold -name "*.apk" 2>/dev/null

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RDCHUPutaway-debug-apk
          path: /tmp/RDCScaffold/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
