name: 🏗️ Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout our code
        uses: actions/checkout@v4
        with:
          path: myapp

      - name: 🟢 Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: ☕ Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install Android platform
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null | tail -3 || true

      - name: 📥 Clone RN 0.73.6 template from GitHub
        run: |
          git clone --depth 1 --branch v0.73.6 \
            https://github.com/facebook/react-native.git /tmp/rn-source
          # Copy the template
          cp -r /tmp/rn-source/packages/react-native/template /tmp/RDCScaffold
          echo "✅ Template cloned"
          ls /tmp/RDCScaffold/

      - name: 🔧 Configure template package name
        run: |
          S=/tmp/RDCScaffold
          # Replace HelloWorld with RDCHUPutaway in all files
          find $S -type f \( -name "*.kt" -o -name "*.java" -o -name "*.xml" -o -name "*.gradle" -o -name "*.json" \) | while read f; do
            sed -i 's/com\.helloworld/com.rdchuputaway/g' "$f"
            sed -i 's/HelloWorld/RDCHUPutaway/g' "$f"
            sed -i 's/helloworld/rdchuputaway/g' "$f"
          done
          # Rename java package directories
          if [ -d "$S/android/app/src/main/java/com/helloworld" ]; then
            mv $S/android/app/src/main/java/com/helloworld \
               $S/android/app/src/main/java/com/rdchuputaway
          fi
          echo "✅ Package rename done"

      - name: 🔀 Overlay our source files
        run: |
          S=/tmp/RDCScaffold
          W=$GITHUB_WORKSPACE/myapp

          # JS
          rm -rf $S/src 2>/dev/null; cp -rf $W/src $S/src
          cp -f $W/App.js $S/App.js
          cp -f $W/index.js $S/index.js
          cp -f $W/app.json $S/app.json
          cp -f $W/babel.config.js $S/babel.config.js
          cp -f $W/metro.config.js $S/metro.config.js
          cp -f $W/package.json $S/package.json

          # Android
          [ -f $W/android/build.gradle ]          && cp -f $W/android/build.gradle $S/android/build.gradle
          [ -f $W/android/settings.gradle ]        && cp -f $W/android/settings.gradle $S/android/settings.gradle
          [ -f $W/android/gradle.properties ]      && cp -f $W/android/gradle.properties $S/android/gradle.properties
          [ -f $W/android/app/build.gradle ]       && cp -f $W/android/app/build.gradle $S/android/app/build.gradle
          [ -f $W/android/app/src/main/AndroidManifest.xml ] && \
            cp -f $W/android/app/src/main/AndroidManifest.xml $S/android/app/src/main/AndroidManifest.xml

          # Kotlin
          mkdir -p $S/android/app/src/main/java/com/rdchuputaway
          cp -f $W/android/app/src/main/java/com/rdchuputaway/MainActivity.kt \
                $S/android/app/src/main/java/com/rdchuputaway/
          cp -f $W/android/app/src/main/java/com/rdchuputaway/MainApplication.kt \
                $S/android/app/src/main/java/com/rdchuputaway/

          echo "✅ Overlay complete"
          echo "=== Screens ==="
          ls $S/src/screens/
          echo "=== Kotlin files ==="
          ls $S/android/app/src/main/java/com/rdchuputaway/

      - name: 📦 npm install
        run: |
          cd /tmp/RDCScaffold
          npm install --legacy-peer-deps
          echo "✅ npm install done"

      - name: 💾 Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: gradle-${{ runner.os }}-rn073

      - name: 🏗️ Build APK
        run: |
          cd /tmp/RDCScaffold/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4096m"
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: 🔍 Find APK
        run: find /tmp/RDCScaffold -name "*.apk" 2>/dev/null

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RDCHUPutaway-debug-apk
          path: /tmp/RDCScaffold/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
