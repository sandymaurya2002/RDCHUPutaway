name: 🏗️ Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: ☕ Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Android platform
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null | grep -E "done|Installed" || true

      - name: 📦 Extract RN 0.73.6 template via npm pack
        run: |
          mkdir -p /tmp/rn-pkg && cd /tmp/rn-pkg
          npm pack react-native@0.73.6 2>&1 | tail -3
          tar -xzf react-native-0.73.6.tgz
          ls package/
          cp -r package/template /tmp/RDCScaffold
          echo "✅ Template extracted"
          ls /tmp/RDCScaffold/android/

      - name: 🔀 Overlay our JS source files
        run: |
          S=/tmp/RDCScaffold
          W=$GITHUB_WORKSPACE
          rm -rf $S/src 2>/dev/null
          cp -rf $W/src            $S/src
          cp -f  $W/App.js         $S/App.js
          cp -f  $W/index.js       $S/index.js
          cp -f  $W/app.json       $S/app.json
          cp -f  $W/babel.config.js $S/babel.config.js
          cp -f  $W/metro.config.js $S/metro.config.js
          cp -f  $W/package.json   $S/package.json
          echo "✅ JS overlay done"

      - name: 📦 npm install (BEFORE gradle touches anything)
        run: |
          cd /tmp/RDCScaffold
          npm install --legacy-peer-deps
          echo "✅ node_modules ready: $(ls node_modules | wc -l) packages"
          # Verify the critical gradle plugin exists
          ls node_modules/@react-native/gradle-plugin/

      - name: 🔀 Overlay Android files (AFTER npm install)
        run: |
          S=/tmp/RDCScaffold
          W=$GITHUB_WORKSPACE

          # Fix package name in template files first
          find $S/android -type f \( -name "*.kt" -o -name "*.java" -o -name "*.xml" -o -name "*.gradle" \) \
            -exec sed -i \
              -e 's/com\.helloworld/com.rdchuputaway/g' \
              -e 's/HelloWorld/RDCHUPutaway/g' \
              -e 's/helloworld/rdchuputaway/g' {} \;

          # Rename java package dir
          find $S/android -type d -name "helloworld" | while read d; do
            mv "$d" "$(dirname $d)/rdchuputaway"
          done

          # Copy our android files (NOT settings.gradle - use template's own)
          cp -f $W/android/build.gradle              $S/android/build.gradle
          cp -f $W/android/gradle.properties         $S/android/gradle.properties
          cp -f $W/android/app/build.gradle          $S/android/app/build.gradle
          cp -f $W/android/app/proguard-rules.pro    $S/android/app/proguard-rules.pro
          cp -f $W/android/app/src/main/AndroidManifest.xml \
                 $S/android/app/src/main/AndroidManifest.xml
          cp -f $W/android/app/src/main/res/values/strings.xml \
                 $S/android/app/src/main/res/values/strings.xml
          cp -f $W/android/app/src/main/res/values/styles.xml \
                 $S/android/app/src/main/res/values/styles.xml

          # Kotlin files
          mkdir -p $S/android/app/src/main/java/com/rdchuputaway
          cp -f $W/android/app/src/main/java/com/rdchuputaway/MainActivity.kt \
                $S/android/app/src/main/java/com/rdchuputaway/
          cp -f $W/android/app/src/main/java/com/rdchuputaway/MainApplication.kt \
                $S/android/app/src/main/java/com/rdchuputaway/

          # Fix settings.gradle rootProject name only
          sed -i "s/rootProject.name = .*/rootProject.name = 'RDCHUPutaway'/" \
                 $S/android/settings.gradle

          echo "=== settings.gradle ==="
          cat $S/android/settings.gradle
          echo "=== Kotlin files ==="
          find $S/android/app/src/main/java -name "*.kt"

      - name: 💾 Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: gradle-${{ runner.os }}-rn0736-v3

      - name: 🔧 chmod gradlew
        run: chmod +x /tmp/RDCScaffold/android/gradlew

      - name: 🏗️ Build APK
        run: |
          cd /tmp/RDCScaffold/android
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4096m"
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: 🔍 Find APK
        run: find /tmp/RDCScaffold -name "*.apk" 2>/dev/null

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RDCHUPutaway-debug-apk
          path: /tmp/RDCScaffold/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
