name: 🏗️ Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: ☕ Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Android platforms
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null | tail -2 || true

      - name: ⬇️ Download RN 0.73.6 template
        run: |
          BASE="https://raw.githubusercontent.com/facebook/react-native/v0.73.6/packages/react-native/template"
          mkdir -p /tmp/RDCBuild/android/app/src/main/java/com/rdcbuild
          mkdir -p /tmp/RDCBuild/android/app/src/main/res/values
          mkdir -p /tmp/RDCBuild/android/app/src/main/res/drawable
          mkdir -p /tmp/RDCBuild/android/gradle/wrapper
          curl -fsSL "$BASE/android/build.gradle"                        -o /tmp/RDCBuild/android/build.gradle
          curl -fsSL "$BASE/android/settings.gradle"                     -o /tmp/RDCBuild/android/settings.gradle
          curl -fsSL "$BASE/android/gradle.properties"                   -o /tmp/RDCBuild/android/gradle.properties
          curl -fsSL "$BASE/android/gradlew"                             -o /tmp/RDCBuild/android/gradlew
          curl -fsSL "$BASE/android/gradlew.bat"                         -o /tmp/RDCBuild/android/gradlew.bat
          curl -fsSL "$BASE/android/gradle/wrapper/gradle-wrapper.properties" -o /tmp/RDCBuild/android/gradle/wrapper/gradle-wrapper.properties
          curl -fsSL "$BASE/android/gradle/wrapper/gradle-wrapper.jar"   -o /tmp/RDCBuild/android/gradle/wrapper/gradle-wrapper.jar
          curl -fsSL "$BASE/android/app/build.gradle"                    -o /tmp/RDCBuild/android/app/build.gradle
          curl -fsSL "$BASE/android/app/src/main/AndroidManifest.xml"    -o /tmp/RDCBuild/android/app/src/main/AndroidManifest.xml
          curl -fsSL "$BASE/android/app/src/main/res/values/strings.xml" -o /tmp/RDCBuild/android/app/src/main/res/values/strings.xml
          curl -fsSL "$BASE/android/app/src/main/res/values/styles.xml"  -o /tmp/RDCBuild/android/app/src/main/res/values/styles.xml
          echo "✅ Template downloaded"
          ls /tmp/RDCBuild/android/gradle/wrapper/

      - name: 🔧 Configure package + write Kotlin files
        run: |
          find /tmp/RDCBuild/android -type f \( -name "*.gradle" -o -name "*.xml" -o -name "*.kt" -o -name "*.properties" \) \
            -exec sed -i -e 's/com\.helloworld/com.rdcbuild/g' -e 's/HelloWorld/RDCBuild/g' -e 's/helloworld/rdcbuild/g' {} \;
          sed -i 's|<string name="app_name">.*</string>|<string name="app_name">RDC HU Putaway</string>|' \
            /tmp/RDCBuild/android/app/src/main/res/values/strings.xml
          python3 $GITHUB_WORKSPACE/scripts/write_kotlin.py
          echo "✅ Package configured"

      - name: 📦 npm install
        run: |
          cp $GITHUB_WORKSPACE/package.json /tmp/RDCBuild/package.json
          cp $GITHUB_WORKSPACE/app.json /tmp/RDCBuild/app.json
          cd /tmp/RDCBuild
          npm install --legacy-peer-deps
          echo "✅ $(ls node_modules | wc -l) packages"

      - name: 🔀 Overlay JS + resources
        run: |
          S=/tmp/RDCBuild
          W=$GITHUB_WORKSPACE
          rm -rf $S/src && cp -rf $W/src $S/src
          cp -f $W/App.js $W/index.js $W/babel.config.js $W/metro.config.js $S/
          cp -rf $W/android/app/src/main/res/. $S/android/app/src/main/res/
          cp -f $W/android/app/src/main/AndroidManifest.xml $S/android/app/src/main/AndroidManifest.xml
          sed -i 's/com\.rdchuputaway/com.rdcbuild/g' $S/android/app/src/main/AndroidManifest.xml
          echo "✅ Overlay done"
          find $S/android/app/src/main/res -type f | sort

      - name: 🔑 Generate debug keystore
        run: |
          keytool -genkeypair -v -keystore /tmp/RDCBuild/android/app/debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" 2>/dev/null && echo "✅ Keystore ready"

      - name: 💾 Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: ${{ runner.os }}-gradle-rn073-v6

      - name: 🔧 chmod gradlew
        run: chmod +x /tmp/RDCBuild/android/gradlew

      - name: 🏗️ Build APK
        run: |
          cd /tmp/RDCBuild/android
          ./gradlew assembleDebug --no-daemon --stacktrace -Dorg.gradle.jvmargs="-Xmx4096m" 2>&1
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: 🔍 Find APK
        run: |
          APK=$(find /tmp/RDCBuild -name "*.apk" 2>/dev/null | head -1)
          if [ -n "$APK" ]; then echo "✅ APK: $APK ($(du -sh $APK | cut -f1))"; else echo "❌ No APK"; exit 1; fi

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RDCHUPutaway-debug-apk
          path: /tmp/RDCBuild/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
