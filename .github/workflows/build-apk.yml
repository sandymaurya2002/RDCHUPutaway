name: 🏗️ Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: ☕ Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Android platform tools
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null | grep -E "done|Installed" || true

      # Step 1: Init scaffold WITHOUT --skip-install so it runs npm install itself
      # This guarantees node_modules exists before gradle ever runs
      - name: 🏗️ react-native init (with npm install)
        env:
          CI: ""
        run: |
          npx --yes react-native@0.73.6 init RDCBuild \
            --version 0.73.6 \
            --directory /tmp/RDCBuild \
            --npm
          echo "✅ Init + npm install done"
          echo "=== node_modules exists? ==="
          ls /tmp/RDCBuild/node_modules/@react-native/gradle-plugin/ | head -5
          echo "=== settings.gradle ==="
          cat /tmp/RDCBuild/android/settings.gradle
          echo "=== app/build.gradle ==="
          cat /tmp/RDCBuild/android/app/build.gradle

      # Step 2: Replace scaffold's package.json with ours and re-install our deps
      - name: 📦 Install our dependencies
        run: |
          cp -f $GITHUB_WORKSPACE/package.json /tmp/RDCBuild/package.json
          cd /tmp/RDCBuild
          npm install --legacy-peer-deps
          echo "✅ $(ls node_modules | wc -l) packages"
          # Verify RN gradle plugin still intact
          ls node_modules/@react-native/gradle-plugin/

      # Step 3: Overlay ONLY JS source - zero android gradle files touched
      - name: 🔀 Overlay JS source only
        run: |
          S=/tmp/RDCBuild
          W=$GITHUB_WORKSPACE

          rm -rf $S/src
          cp -rf $W/src $S/src
          cp -f $W/App.js $W/index.js $W/app.json $W/babel.config.js $W/metro.config.js $S/

          # Resources only (no gradle files)
          cp -f $W/android/app/src/main/AndroidManifest.xml \
                $S/android/app/src/main/AndroidManifest.xml
          cp -f $W/android/app/src/main/res/values/strings.xml \
                $S/android/app/src/main/res/values/strings.xml
          cp -f $W/android/app/src/main/res/values/styles.xml \
                $S/android/app/src/main/res/values/styles.xml

          # Kotlin files - auto-detect scaffold's package
          KT_DIR=$(find $S/android -name "MainActivity.kt" | head -1 | xargs dirname)
          PKG=$(echo $KT_DIR | sed 's|.*/java/||' | tr '/' '.')
          echo "Scaffold package: $PKG"
          sed "s/^package .*/package $PKG/" \
            $W/android/app/src/main/java/com/rdchuputaway/MainActivity.kt > $KT_DIR/MainActivity.kt
          sed "s/^package .*/package $PKG/" \
            $W/android/app/src/main/java/com/rdchuputaway/MainApplication.kt > $KT_DIR/MainApplication.kt

          echo "✅ JS overlay done - all gradle files untouched"

      - name: ⬇️ Download gradle-wrapper.jar
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/gradle/gradle/v8.6.0/gradle/wrapper/gradle-wrapper.jar" \
            -o /tmp/RDCBuild/android/gradle/wrapper/gradle-wrapper.jar
          ls -lh /tmp/RDCBuild/android/gradle/wrapper/

      - name: 💾 Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: gradle-${{ runner.os }}-rn073-final-v1

      - name: 🔧 chmod gradlew
        run: chmod +x /tmp/RDCBuild/android/gradlew

      - name: 🏗️ Build APK
        run: |
          cd /tmp/RDCBuild/android
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4096m"
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: 🔍 Find APK
        run: find /tmp/RDCBuild -name "*.apk" 2>/dev/null

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RDCHUPutaway-debug-apk
          path: /tmp/RDCBuild/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
