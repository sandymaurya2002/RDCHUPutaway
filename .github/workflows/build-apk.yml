name: 🏗️ Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: ☕ Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Android platform tools
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null | grep -E "done|Installed" || true

      - name: 📦 npm install
        run: |
          npm install --legacy-peer-deps
          echo "✅ $(ls node_modules | wc -l) packages"
          ls node_modules/@react-native/gradle-plugin/

      - name: ⬇️ Download gradle-wrapper.jar
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/gradle/gradle/v8.6.0/gradle/wrapper/gradle-wrapper.jar" \
            -o android/gradle/wrapper/gradle-wrapper.jar
          ls -lh android/gradle/wrapper/gradle-wrapper.jar

      - name: 🔧 Fix settings.gradle with absolute path
        run: |
          ROOT=$(pwd)
          PLUGIN_PATH="$ROOT/node_modules/@react-native/gradle-plugin"
          echo "Plugin path: $PLUGIN_PATH"
          ls "$PLUGIN_PATH"

          python3 - <<PYEOF
import os
root = os.getcwd()
plugin_path = os.path.join(root, "node_modules", "@react-native", "gradle-plugin")
content = f"""pluginManagement {{ includeBuild("{plugin_path}") }}
plugins {{ id("com.facebook.react.settings") }}
extensions.configure(com.facebook.react.ReactSettingsExtension){{ ex -> ex.autolinkLibrariesFromCommand() }}
rootProject.name = 'RDCHUPutaway'
include ':app'
includeBuild("{plugin_path}")
"""
with open("android/settings.gradle", "w") as f:
    f.write(content)
print("=== settings.gradle written ===")
print(open("android/settings.gradle").read())
PYEOF

      - name: 🔧 chmod gradlew
        run: chmod +x android/gradlew

      - name: 💾 Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: gradle-${{ runner.os }}-8-6-v7

      - name: 🏗️ Build APK
        run: |
          cd android
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4096m"
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: 🔍 Find APK
        run: find . -name "*.apk" 2>/dev/null

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RDCHUPutaway-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
